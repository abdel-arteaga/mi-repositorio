{% extends "base.html" %}

{% block content %}

<h2>Agregar libro</h2>

<form method="POST">
    Título: <input type="text" name="titulo"><br>
    Autor: <input type="text" name="autor"><br>
    Género: <input type="text" name="genero"><br>

    Estado:
    <select name="estado">
        <option>Leído</option>
        <option>No leído</option>
    </select>

    <button type="submit">Guardar</button>
</form>

{% endblock %}
