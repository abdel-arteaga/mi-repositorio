<!DOCTYPE html>
<html>
<head>
    <title>Biblioteca</title>
</head>
<body>

<nav>

<div class="container">

{% with messages = get_flashed_messages() %}

    {% for msg in messages %}

    {% endfor %}
  {% endif %}
{% endwith %}

{% block content %}{% endblock %}

</div>

</body>
</html>
