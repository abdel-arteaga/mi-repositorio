<!DOCTYPE html>
<html>
<head>
    <title>Biblioteca</title>
</head>
<body>
    <h1>Mis libros</h1>

    <form action="/add" method="POST">
        <input type="text" name="titulo" placeholder="Título del libro">
        <button type="submit">Agregar</button>
    </form>

    <ul>
        {% for libro in libros %}
            <li>
                {{ libro }}
                <a href="/delete/{{ loop.index0 }}">Eliminar</a>
            </li>
        {% endfor %}
    </ul>
</body>
</html>
